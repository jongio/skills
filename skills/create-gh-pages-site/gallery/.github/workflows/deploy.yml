name: Deploy template gallery to GitHub Pages

# The gallery is a zero-build static site. This workflow publishes it as-is.
# It only runs when this folder is the repository root (e.g. if the gallery
# graduates into its own jongio/gh-pages-templates repo). Inside the skills
# monorepo it is illustrative — GitHub only runs workflows at the repo root.
# Set Settings → Pages → Source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
