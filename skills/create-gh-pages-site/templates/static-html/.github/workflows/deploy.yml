name: Deploy static site to GitHub Pages

# Publishes the repository root as a static site using the official GitHub
# Pages Actions flow. Set Settings → Pages → Source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root. This template's links are relative,
          # so no base path is needed.
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
